services:
  postgres:
    image: postgres:16
    container_name: cleaning-postgres
    restart: unless-stopped
    shm_size: 256mb
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cleaning}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cleaning_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cleaning_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleaning -d cleaning_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: cleaning-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cleaning-backend
    ports:
      - "8005:8000"
    env_file: .env
    environment:
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=${DATABASE_URL:-postgresql://cleaning:cleaning_secret@postgres:5432/cleaning_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://185.244.50.22:3007,http://localhost:3007,http://127.0.0.1:3007,http://frontend:3000}
      - API_BASE_URL=${API_BASE_URL:-http://185.244.50.22:8005}
    volumes:
      - avatars_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./clining
      dockerfile: Dockerfile
    container_name: cleaning-frontend
    ports:
      - "3007:3000"
    env_file: .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - AUTH_SECRET=${AUTH_SECRET:-change-this-in-production-min-32-chars}
      - AUTH_URL=${AUTH_URL:-http://185.244.50.22:3007}
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://185.244.50.22:3007}
      - NEXT_PUBLIC_COMPANY_PHONE=${NEXT_PUBLIC_COMPANY_PHONE:-}
      - NEXT_PUBLIC_COMPANY_EMAIL=${NEXT_PUBLIC_COMPANY_EMAIL:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - YANDEX_CLIENT_ID=${YANDEX_CLIENT_ID:-}
      - YANDEX_CLIENT_SECRET=${YANDEX_CLIENT_SECRET:-}
    volumes:
      - frontend_public:/app/public
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  avatars_data:
  frontend_public:
